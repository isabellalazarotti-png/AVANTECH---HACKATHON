<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Evantech - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">EVANTECH</div>
        <div class="menu-links">
            <a href="index.html" class="active">Dashboard</a>
            <a href="cadastro.html">Novo Cadastro</a>
            <a href="listagem.html">Participantes</a>
        </div>
    </nav>

    <div class="container">
        <h1>Painel Geral do Evento</h1>
        <p>Dados de lotação lidos em tempo real do banco de dados na nuvem do Google.</p>
        <div class="card-grid">
            <div class="card">
                <h3>Vagas Preenchidas</h3>
                <div class="number" id="vagas-total">...</div>
            </div>
            <div class="card">
                <h3>Status</h3>
                <div class="number" id="status-evento" style="font-size: 24px; padding-top: 10px; color: #deff9a;">Aberto</div>
            </div>
        </div>
    </div>

    <script>
        async function atualizarDash() {
            // Puxa os dados para fazer a contagem em tempo real
            const res = await fetch('https://avantech-be677-default-rtdb.firebaseio.com/participantes.json');
            const dados = await res.json();
            
            const total = dados ? Object.keys(dados).length : 0;
            document.getElementById('vagas-total').innerText = total;
            
            // REGRA DE NEGÓCIO: Se chegar a 5 vagas, o status muda para LOTADO automaticamente
            if(total >= 5) { 
                document.getElementById('status-evento').innerText = "LOTADO";
                document.getElementById('status-evento').style.color = "#ff6b6b";
            }
        }
        atualizarDash();
    </script>
</body>
</html>
