<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Evantech - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">EVANTECH</div>
        <div class="menu-links">
            <a href="index.html">Dashboard</a>
            <a href="cadastro.html" class="active">Novo Cadastro</a>
            <a href="listagem.html">Participantes</a>
        </div>
    </nav>

    <div class="container">
        <h1>Inscrição de Participante</h1>
        <p>Preencha os campos abaixo para registrar um novo participante no banco de dados.</p>
        <form id="form-cadastro">
            <div class="form-group">
                <label>Nome Completo:</label>
                <input type="text" id="nome" required placeholder="Ex: João Silva">
            </div>
            <div class="form-group">
                <label>CPF (Apenas números):</label>
                <input type="text" id="cpf" required placeholder="Ex: 12345678901">
            </div>
            <button type="submit" class="btn">Confirmar Inscrição</button>
        </form>
    </div>

    <script>
        document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const cpf = document.getElementById('cpf').value;

            // 1. Busca dados no seu Firebase para validar Regra de Negócio (CPF único)
            const respostaBusca = await fetch('https://avantech-be677-default-rtdb.firebaseio.com/participantes.json');
            const dadosExistentes = await respostaBusca.json();
            
            if (dadosExistentes) {
                const cpfDuplicado = Object.values(dadosExistentes).some(p => p.cpf === cpf);
                if (cpfDuplicado) {
                    alert("Erro: Este CPF já está cadastrado no banco de dados!");
                    return;
                }
            }

            // 2. Salva de verdade no seu banco de dados Firebase
            const respostaSalvar = await fetch('https://avantech-be677-default-rtdb.firebaseio.com/participantes.json', {
                method: 'POST',
                body: JSON.stringify({ nome, cpf })
            });

            if (respostaSalvar.ok) {
                alert("Inscrição guardada com sucesso no Banco de Dados!");
                window.location.href = 'listagem.html'; // Vai automático para a lista
            } else {
                alert("Erro ao conectar com o banco de dados.");
            }
        });
    </script>
</body>
</html>
